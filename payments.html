<!doctype html>
<html lang="en">

<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Payments - Smart Gym</title>
  <link rel="stylesheet" href="style.css" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
</head>

<body>
  <header class="site-header">
    <div class="container">
      <a href="index.html" class="logo"><i class="fas fa-dumbbell"></i> Smart Gym</a>
      <nav>
        <a href="index.html">Home</a>
        <div id="user-nav" style="display: flex; align-items: center; gap: 1rem;">
          <a href="login.html" id="login-link" class="btn btn-sm btn-outline">Login</a>
          <a href="register.html" id="register-link" class="btn btn-sm btn-primary">Register</a>
        </div>
      </nav>
    </div>
  </header>

  <main class="container" style="padding-top: 4rem; padding-bottom: 4rem;">
    <h2 class="mb-4">Payments</h2>

    <div class="feature-card mb-4">
      <h3 class="mb-3">Record Payment</h3>
      <div style="display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 1rem;">
        <div>
          <label>Member</label>
          <select id="payMember"></select>
        </div>
        <div>
          <label>Amount (৳)</label>
          <input type="number" id="payAmount" placeholder="0.00" />
        </div>
        <div>
          <label>Method</label>
          <select id="payMethod">
            <option value="Cash">Cash</option>
            <option value="Card">Card</option>
            <option value="Online">Online</option>
          </select>
        </div>
        <div style="display: flex; align-items: flex-end;">
          <button id="payBtn" class="btn btn-primary" style="width: 100%;">Record</button>
        </div>
      </div>
    </div>

    <h3 class="mb-3">Transaction History</h3>
    <div class="table-container" id="transactions">
      <!-- Table injected by JS -->
    </div>
  </main>

  <footer class="site-footer">
    <div class="container">
      <div class="footer-bottom">
        <p>&copy; 2026 Smart Gym Management System. Developed by Group 4</p>
      </div>
    </div>
  </footer>

  <script src="script.js"></script>
</body>

</html>
