<!doctype html>
<html lang="en">

<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Login - Smart Gym</title>
  <link rel="stylesheet" href="style.css" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
</head>

<body class="auth-page">
  <header class="site-header">
    <div class="container">
      <a href="index.html" class="logo"><i class="fas fa-dumbbell"></i> Smart Gym</a>
      <nav>
        <a href="index.html">Home</a>
        <div id="user-nav" style="display: flex; align-items: center; gap: 1rem;">
          <a href="login.html" id="login-link" class="btn btn-sm btn-outline">Login</a>
          <a href="register.html" id="register-link" class="btn btn-sm btn-primary">Register</a>
        </div>
      </nav>
    </div>
  </header>

  <main class="container">
    <div class="form-card">
      <h2 class="text-center mb-4">Welcome Back</h2>
      <form id="loginForm">
        <div class="form-group">
          <label for="loginEmail">Email Address</label>
          <input type="email" id="loginEmail" required placeholder="john@example.com" />
        </div>
        <div class="form-group">
          <label for="loginPassword">Password</label>
          <input type="password" id="loginPassword" required placeholder="••••••••" />
        </div>
        <div class="form-group">
          <label for="loginRole">Login As</label>
          <select id="loginRole">
            <option value="member">Member</option>
            <option value="trainer">Trainer</option>
            <option value="admin">Admin</option>
          </select>
        </div>
        <button type="submit" class="btn btn-primary" style="width: 100%;">Login</button>
      </form>
      <p class="text-center mt-4 text-muted">
        Don't have an account? <a href="register.html" style="color: var(--primary-color);">Register here</a>
      </p>
    </div>
  </main>

  <footer class="site-footer">
    <div class="container">
      <div class="footer-bottom">
        <p>&copy; 2025 Smart Gym Management System. Developed by Group 6</p>
      </div>
    </div>
  </footer>

  <script src="script.js"></script>
</body>

</html>
