<!doctype html>
<html lang="en">

<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Members - Smart Gym</title>
  <link rel="stylesheet" href="style.css" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
</head>

<body>
  <header class="site-header">
    <div class="container">
      <a href="index.html" class="logo"><i class="fas fa-dumbbell"></i> Smart Gym</a>
      <nav>
        <a href="index.html">Home</a>
        <div id="user-nav" style="display: flex; align-items: center; gap: 1rem;">
          <a href="login.html" id="login-link" class="btn btn-sm btn-outline">Login</a>
          <a href="register.html" id="register-link" class="btn btn-sm btn-primary">Register</a>
        </div>
      </nav>
    </div>
  </header>

  <main class="container" style="padding-top: 4rem; padding-bottom: 4rem;">
    <h2 class="mb-4">Member Management</h2>

    <div class="feature-card mb-4">
      <h3 class="mb-3">Manage Membership</h3>
      <div style="display: flex; gap: 1rem; flex-wrap: wrap;">
        <div style="flex: 1; min-width: 250px;">
          <label>Select Member</label>
          <select id="memberSelect"></select>
        </div>
        <div style="flex: 1; min-width: 200px;">
          <label>Action</label>
          <select id="memberAction">
            <option value="renew">Renew Membership</option>
            <option value="cancel">Cancel Membership</option>
          </select>
        </div>
        <div style="display: flex; align-items: flex-end;">
          <button id="applyMemberAction" class="btn btn-primary">Apply</button>
        </div>
      </div>
    </div>

    <div class="table-container" id="membersList">
      <!-- Table injected by JS -->
    </div>
  </main>

  <footer class="site-footer">
    <div class="container">
      <div class="footer-bottom">
        <p>&copy; 2026 Smart Gym Management System. Developed by Group 4</p>
      </div>
    </div>
  </footer>

  <script src="script.js"></script>
</body>

</html>
